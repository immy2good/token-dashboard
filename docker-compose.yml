version: '3.8'

services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      HOST: 127.0.0.1
      PORT: 8080
      CLAUDE_PROJECTS_DIR: /claude/projects
      TOKEN_DASHBOARD_DB: /claude/token-dashboard.db
    volumes:
      - claude-data:/claude
      - ./token_dashboard:/app/token_dashboard
      - ./web:/app/web
    develop:
      watch:
        - action: sync
          path: ./token_dashboard
          target: /app/token_dashboard
        - action: sync
          path: ./web
          target: /app/web
        - action: rebuild
          path: ./pricing.json
    restart: unless-stopped

volumes:
  claude-data:
