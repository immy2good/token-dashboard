version: '3.8'

services:
  dashboard:
    image: your-username/token-dashboard:latest
    pull_policy: always
    container_name: token-dashboard
    ports:
      - "8080:8080"
    environment:
      HOST: 0.0.0.0
      PORT: 8080
      CLAUDE_PROJECTS_DIR: /claude/projects
      TOKEN_DASHBOARD_DB: /claude/token-dashboard.db
      PYTHONUNBUFFERED: "1"
    volumes:
      - claude-data:/claude
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080').close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

volumes:
  claude-data:
    driver: local
